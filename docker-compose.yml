services:

  db:
    image: postgis/postgis:16-3.4
    container_name: geodb

    environment:
      POSTGRES_DB: geospatialdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nik1515

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: geo-backend

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:nik1515@db:5432/geospatialdb

  frontend:
    build: ./frontend
    container_name: geo-frontend

    depends_on:
      - backend

    ports:
      - "8080:80"

volumes:
  postgres_data:
