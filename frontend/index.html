<!DOCTYPE html>
<html>
<head>
    <title>Geospatial Intelligence Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Dashboard */
        .dashboard {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px;
            border-radius: 10px;
            width: 230px;
        }

        .card {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .title {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div id="map"></div>

<!-- Dashboard -->
<div class="dashboard">
    <div class="title">Analytics Dashboard</div>

    <div class="card">
        Total Nodes: <span id="total">0</span>
    </div>

    <div class="card">
        <div class="title">By Type</div>
        <div id="types"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* ---------------- MAP ---------------- */
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

/* ---------------- MARKERS ---------------- */
let markers = [];

function updateMarkers(data) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(p => {
        const marker = L.marker([p.latitude, p.longitude])
            .addTo(map)
            .bindPopup(`<b>${p.name}</b><br>${p.infra_type}`);

        markers.push(marker);
    });
}

/* ---------------- INITIAL LOAD ---------------- */
fetch("http://localhost:8000/locations")
    .then(r => r.json())
    .then(updateMarkers);

/* ---------------- WEBSOCKET ---------------- */
const socket = new WebSocket("ws://localhost:8000/ws/locations");

socket.onmessage = function(event) {
    const data = JSON.parse(event.data);
    updateMarkers(data);
};

/* ---------------- ANALYTICS ---------------- */
function loadAnalytics() {
    fetch("http://localhost:8000/analytics")
        .then(r => r.json())
        .then(data => {

            document.getElementById("total").innerText = data.total_points;

            let html = "";
            data.by_type.forEach(t => {
                html += `<div>${t.type}: ${t.count}</div>`;
            });

            document.getElementById("types").innerHTML = html;
        });
}

loadAnalytics();
setInterval(loadAnalytics, 5000);

</script>

</body>
</html>
