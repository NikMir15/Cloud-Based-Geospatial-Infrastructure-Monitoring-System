<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cloud-Based Geospatial Infrastructure Monitoring System</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #111;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .dashboard {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;

            min-width: 280px;

            background: rgba(0, 0, 0, 0.85);
            color: white;

            padding: 15px;

            border-radius: 12px;

            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        }

        .dashboard h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .dashboard p {
            margin: 5px 0;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- Dashboard -->
    <div class="dashboard">

        <h2>Infrastructure Monitor</h2>

        <div id="stats">
            Loading statistics...
        </div>

    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App JS -->
    <script src="app.js"></script>

</body>

</html>
